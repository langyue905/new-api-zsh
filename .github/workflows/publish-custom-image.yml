name: Publish Custom Image

on:
  workflow_run:
    workflows:
      - Custom CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Immutable release tag, for example v1.0.0-rc.20-zsh.0'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-custom-image-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'custom/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'custom/main' }}

      - name: Resolve image metadata
        id: version
        env:
          REQUESTED_RELEASE_VERSION: ${{ inputs.release_version }}
        shell: bash
        run: |
          set -euo pipefail
          upstream="$(tr -d '[:space:]' < UPSTREAM_VERSION)"
          revision="$(git rev-parse HEAD)"
          sha="$(git rev-parse --short=12 HEAD)"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          requested="${REQUESTED_RELEASE_VERSION:-}"
          if [[ -n "$requested" ]]; then
            prefix="${upstream}-zsh."
            suffix="${requested#"$prefix"}"
            if [[ "$requested" != "$prefix"* || ! "$suffix" =~ ^[0-9]+$ ]]; then
              echo "release_version must match ${upstream}-zsh.N" >&2
              exit 1
            fi
            version="$requested"
            candidate=false
          else
            version="${upstream}-zsh.candidate-${sha}"
            candidate=true
          fi
          printf '%s\n' "$version" > VERSION
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "candidate=$candidate" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image:$version" >> "$GITHUB_OUTPUT"
          jq -n \
            --arg image "$image" \
            --arg image_ref "$image:$version" \
            --arg version "$version" \
            --arg sha "$sha" \
            --arg revision "$revision" \
            --argjson candidate "$candidate" \
            '{image:$image,image_ref:$image_ref,version:$version,sha:$sha,revision:$revision,candidate:$candidate}' \
            > published-image.json

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Protect immutable image tag
        id: existing
        shell: bash
        run: |
          set -euo pipefail
          ref='${{ steps.version.outputs.image_ref }}'
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            if [[ '${{ steps.version.outputs.candidate }}' == 'true' ]]; then
              echo 'immutable candidate image already exists; reuse it without rebuilding'
              echo 'publish=false' >> "$GITHUB_OUTPUT"
            else
              echo "release tag already exists and is immutable: $ref" >&2
              exit 1
            fi
          else
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish multi-architecture image
        if: steps.existing.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.image_ref }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.version.outputs.revision }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Save published image metadata
        uses: actions/upload-artifact@v4
        with:
          name: published-image
          path: published-image.json
          if-no-files-found: error
          retention-days: 14
